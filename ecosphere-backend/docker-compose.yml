version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecosphere
    ports:
      - "5432:5432"
    volumes:
      - ecosphere_pg_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ecosphere?schema=public
      - JWT_SECRET=supersecret123
      - PORT=5000
    depends_on:
      - db

volumes:
  ecosphere_pg_data:
